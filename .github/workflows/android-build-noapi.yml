name: Build Android (no-official-api)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v2.4.7). Leave blank to only upload artifact.'
        required: false
        default: ''

jobs:
  build-android-arm64:
    name: Build android-arm64 (no-official-api)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Configure Android linker
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$TOOLCHAIN" >> "$GITHUB_PATH"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"

      - name: Stub private Official-API path dep
        shell: bash
        run: |
          set -euo pipefail
          STUB="$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"
          mkdir -p "$STUB/src"
          cat > "$STUB/Cargo.toml" <<'EOF'
          [package]
          name = "tomato-novel-official-api"
          version = "0.0.0"
          edition = "2021"
          EOF
          echo '' > "$STUB/src/lib.rs"

      - name: Read crate version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          V=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-arm64-noapi-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            android-arm64-noapi-

      - name: Build release binary (android arm64, no-official-api)
        run: cargo build --release --target aarch64-linux-android --no-default-features --features no-official-api,tts-native,clipboard

      - name: Bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-Android_arm64-v${{ steps.ver.outputs.version }}-noapi"
          cp target/aarch64-linux-android/release/tomato-novel-downloader "dist/${out}"
          ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-noapi
          path: dist

      - name: Upload to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"

name: Build Android (no-official-api)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v2.4.7). Leave blank to only upload artifact.'
        required: false
        default: ''

jobs:
  build:
    name: Build ${{ matrix.label }} (no-official-api)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: android-arm64
            rust_target: aarch64-linux-android
            ndk_clang: aarch64-linux-android21-clang
            env_prefix: AARCH64_LINUX_ANDROID
            cc_var: aarch64_linux_android
            asset_arch: arm64
          - label: android-arm32
            rust_target: armv7-linux-androideabi
            ndk_clang: armv7a-linux-androideabi21-clang
            env_prefix: ARMV7_LINUX_ANDROIDEABI
            cc_var: armv7_linux_androideabi
            asset_arch: arm32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Configure Android linker
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$TOOLCHAIN" >> "$GITHUB_PATH"
          echo "CARGO_TARGET_${{ matrix.env_prefix }}_LINKER=$TOOLCHAIN/${{ matrix.ndk_clang }}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${{ matrix.env_prefix }}_AR=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CC_${{ matrix.cc_var }}=$TOOLCHAIN/${{ matrix.ndk_clang }}" >> "$GITHUB_ENV"
          echo "CXX_${{ matrix.cc_var }}=$TOOLCHAIN/${{ matrix.ndk_clang }}++" >> "$GITHUB_ENV"
          echo "AR_${{ matrix.cc_var }}=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"

      - name: Stub private Official-API path dep
        shell: bash
        run: |
          set -euo pipefail
          STUB="$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"
          mkdir -p "$STUB/src"
          cat > "$STUB/Cargo.toml" <<'EOF'
          [package]
          name = "tomato-novel-official-api"
          version = "0.0.0"
          edition = "2021"
          EOF
          echo '' > "$STUB/src/lib.rs"

      - name: Read crate version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          V=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.label }}-noapi-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.label }}-noapi-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.rust_target }} --no-default-features --features no-official-api,tts-native,clipboard

      - name: Bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          out="TomatoNovelDownloader-Android_${{ matrix.asset_arch }}-v${{ steps.ver.outputs.version }}-noapi"
          cp target/${{ matrix.rust_target }}/release/tomato-novel-downloader "dist/${out}"
          ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-noapi
          path: dist

      - name: Upload to release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
